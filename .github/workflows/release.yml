name: Release Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    outputs:
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get Commit Message
        id: commit
        run: echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Sync with Remote
        run: |
          git fetch origin main
          git pull origin main --rebase

      - name: Determine Version Bump
        id: version
        run: |
          current=$(cat version.txt)
          IFS='.' read -r major minor patch <<< "$current"

          if [[ "${{ steps.commit.outputs.message }}" == *"BREAKING CHANGE"* ]]; then
            major=$((major+1)); minor=0; patch=0
          elif [[ "${{ steps.commit.outputs.message }}" == feat:* ]]; then
            minor=$((minor+1)); patch=0
          elif [[ "${{ steps.commit.outputs.message }}" == fix:* ]]; then
            patch=$((patch+1))
          fi

          new="$major.$minor.$patch"
          echo $new > version.txt
          echo "new_version=$new" >> $GITHUB_OUTPUT

      - name: Commit Version Update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add version.txt
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}" || echo "No changes to commit"

          git push origin HEAD:main

      - name: Create Tag
        run: |
          TAG=v${{ steps.version.outputs.new_version }}

          if git ls-remote --tags origin | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists. Skipping..."
          else
            git tag $TAG
            git push origin $TAG
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.new_version }}

  deploy-production:
    needs: release
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t app:prod .

      - name: Run Container
        run: docker run -d -p 3000:3000 --name prod app:prod

      - name: Production Health Check
        run: |
          sleep 5
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:3000)
          if [ "$STATUS" -ne 200 ]; then
            echo "Production health check failed"
            exit 1
          fi