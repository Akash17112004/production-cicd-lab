name: Staging Deployment

on:
  push:
    branches:
      - develop

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Build Docker Image
        run: docker build -t myapp:staging-latest .

      - name: Run Container
        run: docker run -d -p 3000:3000 myapp:staging-latest

      - name: Smoke Test
        run: |
          sleep 5
          curl -f http://localhost:3000 || exit 1