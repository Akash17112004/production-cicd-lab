name: CI Pipeline

on:
  push:
    branches:
      - 'feature/*'
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16, 18]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Run Lint
        run: npm run lint

      - name: Run Tests (Coverage enforced by Jest)
        run: npm test

      - name: Upload Build Artifact
        if: matrix.node-version == 18
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: .