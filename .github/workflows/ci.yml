name: CI/CD Pipeline

on:
  push:
    branches:
      - 'feature/*'
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Upload Build Artifact
        if: matrix.node-version == 18
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: .

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Build Docker Image
        run: docker build -t myapp:staging-latest .

      - name: Run Container
        run: docker run -d --name staging-container myapp:staging-latest

      - name: Smoke Test
        run: |
          sleep 5
          docker exec staging-container curl -f http://localhost:3000 || exit 1